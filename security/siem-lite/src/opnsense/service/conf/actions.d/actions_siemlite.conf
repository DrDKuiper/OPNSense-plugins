[start]
command:/usr/local/etc/rc.d/siemlite start
parameters:
type:script
message:starting siemlite

[stop]
command:/usr/local/etc/rc.d/siemlite stop
parameters:
type:script
message:stopping siemlite

[restart]
command:/usr/local/etc/rc.d/siemlite restart
parameters:
type:script
message:restarting siemlite

[status]
command:/usr/local/etc/rc.d/siemlite status; exit 0
parameters:
type:script_output
message:request siemlite status

[reconfigure]
command:/usr/local/sbin/configctl template reload OPNsense/SIEMLite; /usr/local/etc/rc.d/siemlite restart
parameters:
type:script
message:reconfigure siemlite

[query-events]
command:/usr/local/opnsense/scripts/OPNsense/SIEMLite/siemlite_query.py query-events
parameters:%s
type:script_output
message:query siem events

[get-event]
command:/usr/local/opnsense/scripts/OPNsense/SIEMLite/siemlite_query.py get-event
parameters:%s
type:script_output
message:get siem event detail

[query-alerts]
command:/usr/local/opnsense/scripts/OPNsense/SIEMLite/siemlite_query.py query-alerts
parameters:%s
type:script_output
message:query siem alerts

[ack-alert]
command:/usr/local/opnsense/scripts/OPNsense/SIEMLite/siemlite_query.py ack-alert
parameters:%s
type:script_output
message:acknowledge siem alert

[close-alert]
command:/usr/local/opnsense/scripts/OPNsense/SIEMLite/siemlite_query.py close-alert
parameters:%s
type:script_output
message:close siem alert

[dashboard-stats]
command:/usr/local/opnsense/scripts/OPNsense/SIEMLite/siemlite_query.py dashboard-stats
parameters:%s
type:script_output
message:get siem dashboard stats

[risk-history]
command:/usr/local/opnsense/scripts/OPNsense/SIEMLite/siemlite_query.py risk-history
parameters:
type:script_output
message:get risk score history

[get-rules]
command:/usr/local/opnsense/scripts/OPNsense/SIEMLite/siemlite_query.py get-rules
parameters:
type:script_output
message:get sigma rules from config
