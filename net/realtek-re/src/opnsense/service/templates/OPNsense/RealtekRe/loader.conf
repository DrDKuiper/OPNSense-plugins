{% if not helpers.exists('OPNsense.RealtekRe.general.Enabled') or OPNsense.RealtekRe.general.Enabled == "1" %}
if_re_load="YES"
if_re_name="/boot/modules/if_re.ko"
{%   if helpers.exists('OPNsense.RealtekRe.general.IntrFilter') and OPNsense.RealtekRe.general.IntrFilter == "1" %}
hw.re.intr_filter="1"
{%   endif %}
{%   if helpers.exists('OPNsense.RealtekRe.general.MsiDisable') and OPNsense.RealtekRe.general.MsiDisable == "1" %}
hw.re.msi_disable="1"
{%   endif %}
{%   if helpers.exists('OPNsense.RealtekRe.general.MsixDisable') and OPNsense.RealtekRe.general.MsixDisable == "1" %}
hw.re.msix_disable="1"
{%   endif %}
{%   if helpers.exists('OPNsense.RealtekRe.general.PreferIomap') and OPNsense.RealtekRe.general.PreferIomap == "1" %}
hw.re.prefer_iomap="1"
{%   endif %}
{%   if helpers.exists('OPNsense.RealtekRe.general.MaxRxMbufSize') and OPNsense.RealtekRe.general.MaxRxMbufSize != "" %}
hw.re.max_rx_mbuf_sz="{{ OPNsense.RealtekRe.general.MaxRxMbufSize }}"
{%   endif %}
{%   if helpers.exists('OPNsense.RealtekRe.general.InterfaceUnit') and helpers.exists('OPNsense.RealtekRe.general.IntRxMod') and OPNsense.RealtekRe.general.InterfaceUnit != "" and OPNsense.RealtekRe.general.IntRxMod != "" %}
dev.re.{{ OPNsense.RealtekRe.general.InterfaceUnit }}.int_rx_mod="{{ OPNsense.RealtekRe.general.IntRxMod }}"
{%   endif %}
{%   if helpers.exists('OPNsense.RealtekRe.general.S5Wol') and OPNsense.RealtekRe.general.S5Wol == "1" %}
hw.re.s5wol="1"
{%   endif %}
{%   if helpers.exists('OPNsense.RealtekRe.general.S0MagicPacket') and OPNsense.RealtekRe.general.S0MagicPacket == "1" %}
hw.re.s0_magic_packet="1"
{%   endif %}
{% endif %}