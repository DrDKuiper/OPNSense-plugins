{% if not helpers.exists('OPNsense.RealtekRe.general.Enabled') or OPNsense.RealtekRe.general.Enabled|default("1") == "1" %}
if_re_load="YES"
if_re_name="/boot/modules/if_re.ko"
{%   if OPNsense.RealtekRe.general.IntrFilter|default("0") == "1" %}
hw.re.intr_filter="1"
{%   endif %}
{%   if OPNsense.RealtekRe.general.MsiDisable|default("0") == "1" %}
hw.re.msi_disable="1"
{%   endif %}
{%   if OPNsense.RealtekRe.general.MsixDisable|default("0") == "1" %}
hw.re.msix_disable="1"
{%   endif %}
{%   if OPNsense.RealtekRe.general.PreferIomap|default("0") == "1" %}
hw.re.prefer_iomap="1"
{%   endif %}
{%   if helpers.exists('OPNsense.RealtekRe.general.MaxRxMbufSize') and not helpers.empty('OPNsense.RealtekRe.general.MaxRxMbufSize') %}
hw.re.max_rx_mbuf_sz="{{ OPNsense.RealtekRe.general.MaxRxMbufSize }}"
{%   endif %}
{%   if helpers.exists('OPNsense.RealtekRe.general.InterfaceUnit') and not helpers.empty('OPNsense.RealtekRe.general.InterfaceUnit') and helpers.exists('OPNsense.RealtekRe.general.IntRxMod') and not helpers.empty('OPNsense.RealtekRe.general.IntRxMod') %}
dev.re.{{ OPNsense.RealtekRe.general.InterfaceUnit }}.int_rx_mod="{{ OPNsense.RealtekRe.general.IntRxMod }}"
{%   endif %}
{%   if OPNsense.RealtekRe.general.S5Wol|default("0") == "1" %}
hw.re.s5wol="1"
{%   endif %}
{%   if OPNsense.RealtekRe.general.S0MagicPacket|default("0") == "1" %}
hw.re.s0_magic_packet="1"
{%   endif %}
{% endif %}