[reconfigure]
command:mkdir -p /usr/local/etc/rc.loader.d; configctl -q template reload OPNsense/RealtekRe; echo 'Realtek RE loader configuration updated. Reboot to apply driver changes.'
type:script_output
message:reconfigure Realtek RE loader settings
errors:no

[package-version]
command:pkg query "%v" realtek-re-kmod 2>/dev/null || echo unavailable
type:script_output
message:get realtek-re-kmod version
errors:no

[module-loaded]
command:kldstat -n if_re >/dev/null 2>&1 && echo yes || echo no
type:script_output
message:check if if_re module is loaded
errors:no

[module-file]
command:test -f /boot/modules/if_re.ko && echo /boot/modules/if_re.ko || echo missing
type:script_output
message:get realtek if_re module path
errors:no

[interfaces]
command:ifconfig -l | tr ' ' '\n' | grep '^re[0-9][0-9]*$' || true
type:script_output
message:list realtek re interfaces
errors:no

[loader-config]
command:test -f /usr/local/etc/rc.loader.d/50-realtek-re && cat /usr/local/etc/rc.loader.d/50-realtek-re || true
type:script_output
message:show realtek re loader configuration
errors:no